
name: living_books_universe
description: Living Books Universe - Interactive Book Reader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  file_picker: ^8.0.6
  path: ^1.9.0
  collection: ^1.18.0
  provider: ^6.1.5+1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/music/
    - assets/sounds/
